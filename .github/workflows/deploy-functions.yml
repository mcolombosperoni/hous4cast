name: Deploy Firebase Functions

# Triggers on the same release tags as the Pages workflow,
# so a single `pnpm release:*` deploys both the SPA and the functions.
on:
  push:
    tags:
      - 'release/*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Test functions (unit tests)
        working-directory: functions
        run: npm test

      - name: Build functions (TypeScript → JS)
        working-directory: functions
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: firebase deploy --only functions --project hous4cast

